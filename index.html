<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Igual a todas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #1a1018;
    --ash: #2e2430;
    --smoke: #3d3044;
    --mist: #9b8fa0;
    --pale: #e8dde8;
    --rose-dead: #8b3a52;
    --gold-faded: #b8906a;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    color: var(--pale);
    cursor: default;
  }

  /* ── Rain canvas ── */
  #rain {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Vignette overlay ── */
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(10,6,14,.85) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* ── Cracked texture ── */
  .texture {
    position: fixed; inset: 0;
    opacity: .04;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.05) 2px, rgba(255,255,255,.05) 3px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,.02) 40px, rgba(255,255,255,.02) 41px);
    z-index: 1;
    pointer-events: none;
  }

  /* ── Main stage ── */
  .stage {
    position: relative; z-index: 2;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    padding: 2rem;
    text-align: center;
  }

  /* ── Broken heart ── */
  .heart-wrap {
    position: relative;
    margin-bottom: 2.5rem;
    animation: float 4s ease-in-out infinite;
  }

  .heart-svg {
    width: 90px; height: 90px;
    filter: drop-shadow(0 0 18px rgba(139,58,82,.6));
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  /* ── Tag line ── */
  .tag {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(.75rem, 2vw, .9rem);
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--mist);
    margin-bottom: 1.8rem;
    opacity: 0;
    animation: fadeUp .8s ease forwards .4s;
  }

  /* ── Main headline ── */
  .headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 3rem);
    font-weight: 700;
    line-height: 1.25;
    max-width: 700px;
    color: var(--pale);
    text-shadow: 0 2px 30px rgba(184,144,106,.2);
    opacity: 0;
    animation: fadeUp .9s ease forwards .7s;
  }

  .headline em {
    font-style: italic;
    color: var(--gold-faded);
  }

  /* ── Divider ── */
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose-dead), transparent);
    margin: 2rem auto;
    opacity: 0;
    animation: fadeUp .8s ease forwards 1.1s;
  }

  /* ── Sub message ── */
  .sub {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.55rem);
    font-style: italic;
    font-weight: 400;
    color: var(--mist);
    max-width: 500px;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp .8s ease forwards 1.4s;
  }

  /* ── Timestamp / footnote ── */
  .footnote {
    position: absolute;
    bottom: 2rem;
    font-size: .75rem;
    letter-spacing: .2em;
    color: rgba(155,143,160,.35);
    opacity: 0;
    animation: fadeUp .8s ease forwards 2s;
  }

  /* ── Drip lines (decorative) ── */
  .drip {
    position: absolute;
    top: 0; width: 1px;
    background: linear-gradient(to bottom, var(--rose-dead), transparent);
    animation: drip linear infinite;
    opacity: .45;
  }

  @keyframes drip {
    0%   { height: 0; transform: translateY(-10%); }
    100% { height: 80px; transform: translateY(110vh); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<canvas id="rain"></canvas>
<div class="vignette"></div>
<div class="texture"></div>

<!-- Drip lines -->
<script>
  for(let i=0;i<6;i++){
    const d=document.createElement('div');
    d.className='drip';
    d.style.left=Math.random()*100+'vw';
    d.style.animationDuration=(4+Math.random()*5)+'s';
    d.style.animationDelay=(-Math.random()*8)+'s';
    document.body.appendChild(d);
  }
</script>

<main class="stage">
  <!-- broken heart SVG -->
  <div class="heart-wrap">
    <svg class="heart-svg" viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hg" x1="0" y1="0" x2="100" y2="90" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#8b3a52"/>
          <stop offset="100%" stop-color="#5c1f33"/>
        </linearGradient>
      </defs>
      <!-- left half -->
      <path d="M50 82 C50 82 8 54 8 30 C8 16 18 8 30 8 C38 8 46 14 50 20"
            fill="url(#hg)" opacity=".9"/>
      <!-- right half (shifted to show crack) -->
      <path d="M50 82 C50 82 92 54 92 30 C92 16 82 8 70 8 C62 8 54 14 50 20"
            fill="url(#hg)" opacity=".7"/>
      <!-- crack line -->
      <polyline points="50,20 46,36 54,44 48,58 52,82"
                stroke="#e8dde8" stroke-width="1.2" stroke-linecap="round"
                fill="none" opacity=".5"/>
    </svg>
  </div>

  <p class="tag">Una verdad que duele</p>

  <h1 class="headline">
    Pensaba que eras <em>diferente</em> a las demás…<br/>
    pero terminaste siendo igual a <em>todas</em>.
  </h1>

  <div class="divider"></div>

  <p class="sub">Sé feliz con tu amiguito.</p>

  <span class="footnote">— sin rencor, solo decepción —</span>
</main>

<!-- Rain animation -->
<script>
(function(){
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  let drops = [];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function spawnDrop(){
    drops.push({
      x: Math.random() * canvas.width,
      y: -10,
      speed: 4 + Math.random() * 6,
      len: 10 + Math.random() * 18,
      alpha: .05 + Math.random() * .18
    });
  }

  for(let i=0;i<80;i++){
    drops.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      speed: 4+Math.random()*6,
      len: 10+Math.random()*18,
      alpha: .05+Math.random()*.18
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drops.forEach((d,i)=>{
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.len*.15, d.y + d.len);
      ctx.strokeStyle = `rgba(184,144,106,${d.alpha})`;
      ctx.lineWidth = .8;
      ctx.stroke();
      d.y += d.speed;
      if(d.y > canvas.height+20){
        drops[i] = {
          x: Math.random()*canvas.width,
          y: -10,
          speed: 4+Math.random()*6,
          len: 10+Math.random()*18,
          alpha: .05+Math.random()*.18
        };
      }
    });
    if(Math.random()<.3) spawnDrop();
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
