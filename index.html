<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fuera de Servicio</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:       #0a0a0a;
    --panel:    #111111;
    --border:   #1f1f1f;
    --green:    #00ff88;
    --green-dim:#00994f;
    --yellow:   #ffcc00;
    --red:      #ff3333;
    --txt:      #cccccc;
    --dim:      #555555;
  }

  html, body {
    width:100%; height:100%;
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--txt);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* scanline overlay */
  body::before {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.18) 2px,
      rgba(0,0,0,.18) 4px
    );
    pointer-events:none; z-index:100;
  }

  /* flicker noise */
  body::after {
    content:'';
    position:fixed; inset:0;
    background: transparent;
    pointer-events:none; z-index:99;
    animation: flicker 8s infinite;
  }
  @keyframes flicker {
    0%,100%  { opacity:1; }
    92%      { opacity:1; }
    92.5%    { opacity:.6; }
    93%      { opacity:1; }
    97%      { opacity:1; }
    97.3%    { opacity:.4; }
    97.6%    { opacity:1; }
  }

  /* ── Main panel ── */
  .panel {
    position: relative;
    width: min(680px, 96vw);
    background: var(--panel);
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px #1a1a1a,
      0 0 40px rgba(0,255,136,.04),
      inset 0 1px 0 #252525;
    padding: 0;
    overflow: hidden;
  }

  /* top bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .7rem 1rem;
    background: #0e0e0e;
    border-bottom: 1px solid var(--border);
  }
  .dot {
    width:10px; height:10px;
    border-radius:50%;
  }
  .dot.r { background:#ff3b30; }
  .dot.y { background:#ffcc00; }
  .dot.g { background:#00ff88; animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot {
    0%,100% { opacity:1; }
    50%      { opacity:.3; }
  }
  .topbar-title {
    margin-left: auto;
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--dim);
  }

  /* body */
  .body {
    padding: 2.5rem 2.5rem 2rem;
  }

  /* status badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    font-size: .7rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid rgba(255,51,51,.3);
    padding: .3rem .8rem;
    margin-bottom: 1.8rem;
    position: relative;
    overflow: hidden;
  }
  .badge::before {
    content:'';
    position:absolute; inset:0;
    background: rgba(255,51,51,.06);
  }
  .badge-dot {
    width:6px; height:6px;
    border-radius:50%;
    background: var(--red);
    animation: blink .9s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

  /* big title */
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 7rem);
    line-height: .9;
    letter-spacing: .05em;
    color: #fff;
    text-shadow: 0 0 40px rgba(255,255,255,.08);
    margin-bottom: .3rem;
  }
  .title span {
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,.4);
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: clamp(.75rem, 2.5vw, 1rem);
    color: var(--dim);
    letter-spacing: .08em;
    margin-bottom: 2rem;
  }

  /* divider */
  .hr {
    border:none;
    height: 1px;
    background: linear-gradient(90deg, var(--green-dim), transparent);
    margin: 1.8rem 0;
    opacity: .4;
  }

  /* terminal log */
  .log {
    background: #080808;
    border: 1px solid #1a1a1a;
    padding: 1rem 1.2rem;
    font-size: .75rem;
    line-height: 2;
    color: var(--dim);
    margin-bottom: 1.8rem;
    min-height: 6.5rem;
  }
  .log-line { display:block; }
  .log-line .ts  { color: #333; margin-right:.6rem; }
  .log-line .ok  { color: var(--green); }
  .log-line .err { color: var(--red);   }
  .log-line .wrn { color: var(--yellow);}
  .log-line .txt { color: #666; }

  /* cursor blink */
  .cursor {
    display:inline-block;
    width:7px; height:.9em;
    background: var(--green);
    animation: blink .8s step-end infinite;
    vertical-align: middle;
    margin-left:3px;
  }

  /* progress bar */
  .progress-wrap {
    margin-bottom:1.5rem;
  }
  .progress-label {
    display:flex; justify-content:space-between;
    font-size:.65rem; letter-spacing:.1em;
    color: var(--dim);
    margin-bottom:.4rem;
  }
  .progress-bar {
    width:100%; height:4px;
    background:#1a1a1a;
    position:relative; overflow:hidden;
  }
  .progress-fill {
    height:100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    width:0%;
    animation: fill 4s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(0,255,136,.5);
  }
  @keyframes fill {
    0%   { width:0%;   opacity:1; }
    70%  { width:68%;  opacity:1; }
    85%  { width:68%;  opacity:.5; }
    86%  { width:68%;  opacity:1; }
    100% { width:68%;  opacity:1; }
  }

  /* status row */
  .status-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap:.75rem;
    margin-bottom: 1.5rem;
  }
  .status-item {
    background:#0d0d0d;
    border:1px solid var(--border);
    padding:.6rem .8rem;
    font-size:.65rem;
    letter-spacing:.1em;
  }
  .status-item .s-label { color:var(--dim); display:block; margin-bottom:.25rem; }
  .status-item .s-val   { color:#fff; font-weight:700; }
  .status-item.bad .s-val  { color:var(--red); }
  .status-item.warn .s-val { color:var(--yellow); }
  .status-item.ok .s-val   { color:var(--green); }

  /* footer */
  .footer {
    display:flex; align-items:center; justify-content:space-between;
    padding: .8rem 1rem;
    background:#0e0e0e;
    border-top:1px solid var(--border);
    font-size:.6rem;
    color: var(--dim);
    letter-spacing:.1em;
  }
  .footer .ping {
    display:flex; align-items:center; gap:.4rem;
  }
  .ping-dot {
    width:5px; height:5px; border-radius:50%;
    background:var(--red);
    animation:blink 1.2s step-end infinite;
  }

  /* glitch on title hover */
  .title:hover {
    animation: glitch .3s linear;
  }
  @keyframes glitch {
    0%   { transform:translate(0); }
    20%  { transform:translate(-3px,1px); clip-path:inset(10% 0 70% 0); }
    40%  { transform:translate(3px,-1px); }
    60%  { transform:translate(-2px,2px); }
    80%  { transform:translate(2px,-2px); }
    100% { transform:translate(0); }
  }
</style>
</head>
<body>

<div class="panel">

  <!-- top bar -->
  <div class="topbar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <span class="topbar-title">SYS_MONITOR v2.4.1</span>
  </div>

  <!-- main body -->
  <div class="body">

    <div class="badge">
      <div class="badge-dot"></div>
      ESTADO DEL SISTEMA
    </div>

    <div class="title">FUERA<br/>DE <span>LÍNEA</span></div>
    <div class="subtitle">// conexión interrumpida · servicio no disponible</div>

    <!-- status grid -->
    <div class="status-row">
      <div class="status-item bad">
        <span class="s-label">SERVIDOR</span>
        <span class="s-val">CAÍDO</span>
      </div>
      <div class="status-item warn">
        <span class="s-label">RED</span>
        <span class="s-val">INESTABLE</span>
      </div>
      <div class="status-item ok">
        <span class="s-label">MODO</span>
        <span class="s-val">OFFLINE</span>
      </div>
    </div>

    <!-- progress -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span>INTENTANDO RECONECTAR…</span>
        <span id="pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fill"></div>
      </div>
    </div>

    <hr class="hr"/>

    <!-- terminal log -->
    <div class="log" id="log"></div>

  </div>

  <!-- footer -->
  <div class="footer">
    <div class="ping">
      <div class="ping-dot"></div>
      SIN SEÑAL
    </div>
    <span id="clock">--:--:--</span>
    <span>ERR_CONNECTION_REFUSED</span>
  </div>
</div>

<script>
  // ── Clock ──
  function tick(){
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('clock').textContent =
      pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  tick(); setInterval(tick, 1000);

  // ── Progress label ──
  const fill = document.getElementById('fill');
  const pct  = document.getElementById('pct');
  let prog = 0, dir = 1;
  setInterval(()=>{
    const w = parseFloat(getComputedStyle(fill).width);
    const total = parseFloat(getComputedStyle(fill.parentElement).width);
    const pVal = Math.round(w/total*100);
    pct.textContent = pVal+'%';
  }, 200);

  // ── Terminal log ──
  const log = document.getElementById('log');
  const lines = [
    { type:'err', text:'[CRÍTICO] Conexión al servidor perdida.' },
    { type:'wrn', text:'[AVISO]   Reintentando en 5 segundos…' },
    { type:'txt', text:'[INFO]    Protocolo de reconexión activado.' },
    { type:'err', text:'[ERROR]   Tiempo de espera agotado (timeout).' },
    { type:'txt', text:'[INFO]    Verificando rutas alternativas…' },
    { type:'wrn', text:'[AVISO]   Todas las rutas bloqueadas.' },
    { type:'txt', text:'[INFO]    Esperando respuesta del host…' },
    { type:'err', text:'[ERROR]   Host inalcanzable.' },
    { type:'txt', text:'[INFO]    Diagnóstico en curso…' },
  ];

  let li = 0;
  function addLine(){
    if(li >= lines.length) li = 0;
    const l = lines[li++];
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const ts = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());

    const span = document.createElement('span');
    span.className = 'log-line';
    span.innerHTML = `<span class="ts">${ts}</span><span class="${l.type}">${l.text}</span>`;
    log.appendChild(span);

    // keep only last 4 lines
    while(log.children.length > 4) log.removeChild(log.firstChild);

    // cursor
    const existing = log.querySelector('.cursor');
    if(existing) existing.remove();
    const cur = document.createElement('span');
    cur.className = 'cursor';
    log.appendChild(cur);
  }

  addLine();
  setInterval(addLine, 2200);
</script>
</body>
</html>
